<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePrompt Control</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><span class="shield">🛡️</span> SafePrompt</div>
      <div class="status-badge" id="statusBadge">Active</div>
    </header>

    <div class="stats-card">
      <div class="stat-item">
        <span class="stat-number" id="itemsProtected">0</span>
        <span class="stat-label">Items Protected</span>
      </div>
    </div>

    <div class="controls">
      <div class="toggle-row">
        <span>Protection Mode</span>
        <label class="switch">
          <input type="checkbox" id="toggleProtection" checked>
          <span class="slider round"></span>
        </label>
      </div>
      <div class="actions">
        <button id="clearHistoryBtn" class="btn-secondary">🗑️ Clear Session History</button>
      </div>
    </div>

    <footer>
      <a href="#" target="_blank">Upgrade to Enterprise</a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>
  <script type="module" src="/src/popup.js"></script>
</body>
</html>
