<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="PII warning demo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>
  <circle cx="230" cy="120" r="220" fill="#ef4444" opacity="0.12"/>
  <circle cx="980" cy="520" r="260" fill="#10a37f" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="70" y="70" width="1060" height="540" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="70" y="70" width="1060" height="60" rx="22" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.0)"/>
    <text x="95" y="106" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="800" font-size="16" fill="rgba(229,231,235,0.9)">
      SafePrompt - PII warning (before sending)
    </text>

    <rect x="210" y="210" width="780" height="280" rx="18" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.16)"/>
    <text x="250" y="260" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="900" font-size="20" fill="rgba(229,231,235,0.92)">
      PII detected
    </text>
    <text x="250" y="296" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="rgba(229,231,235,0.75)">
      Sensitive data may be included (Email, Phone, ID).
    </text>
    <text x="250" y="322" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="14" fill="rgba(229,231,235,0.75)">
      Use Secure Send to sanitize, or continue unprotected.
    </text>

    <rect x="250" y="380" width="210" height="52" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/>
    <text x="278" y="413" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="900" font-size="14" fill="rgba(229,231,235,0.88)">
      Continue anyway
    </text>

    <rect x="760" y="380" width="210" height="52" rx="14" fill="#10a37f" stroke="rgba(16,163,127,0.6)"/>
    <text x="802" y="413" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="900" font-size="14" fill="#ffffff">
      Use Secure Send
    </text>

    <text x="90" y="644" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="13" fill="rgba(229,231,235,0.6)">
      Placeholder image - replace with real screenshots/GIFs later.
    </text>
  </g>
</svg>

